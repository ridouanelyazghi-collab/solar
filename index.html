<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Zineb Solar</title>
</head>

<body style="text-align:center;font-family:Arial">

<h2>☀️ Zineb Solar</h2>

<input id="v" placeholder="كمية الماء"><br><br>
<input id="t1" placeholder="درجة الحرارة البداية"><br><br>
<input id="t2" placeholder="درجة الحرارة النهاية"><br><br>
<input id="p" placeholder="قدرة اللوح"><br><br>
<input id="pr" placeholder="ثمن اللوح"><br><br>
<input id="e" placeholder="الكفاءة"><br><br>
<input id="sun" placeholder="عدد ساعات الشمس"><br><br>

<button onclick="calc()">احسب</button>

<h3 id="r"></h3>

<script>
function calc(){
let v = parseFloat(document.getElementById("v").value);
let t1 = parseFloat(document.getElementById("t1").value);
let t2 = parseFloat(document.getElementById("t2").value);
let p = parseFloat(document.getElementById("p").value);
let pr = parseFloat(document.getElementById("pr").value);
let e = parseFloat(document.getElementById("e").value);
let sun = parseFloat(document.getElementById("sun").value);

let Q = v * 4186 * (t2 - t1) / 3600000;
let energy = (p / 1000) * sun * e;

let panels = Q / energy;
let area = panels * 1.8;
let total = panels * pr;

document.getElementById("r").innerHTML =
"⚡ " + Q.toFixed(2) + " kWh<br>" +
"🔲 " + panels.toFixed(1) + " panels<br>" +
"📏 " + area.toFixed(2) + " m²<br>" +
"💰 " + total.toFixed(0) + " dh";
}
</script>

</body>
</html>
